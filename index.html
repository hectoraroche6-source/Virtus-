<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRTUD STORE V 1.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f3ff; /* Cyan Neon por defecto */
            --bg-dark: #050505;
            --panel-bg: #0a0a0a;
            --text-main: #ffffff;
            --text-sec: #aaaaaa;
            --danger: #ff003c;
            --success: #00ff6a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding-bottom: 80px; }

        /* --- UI KIT --- */
        h1, h2, h3, .brand-font { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        
        .btn {
            background: var(--primary); color: #000; padding: 12px 20px; border: none;
            font-weight: bold; text-transform: uppercase; clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            cursor: pointer; transition: 0.2s; width: 100%; margin-top: 10px; font-family: 'Orbitron';
        }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-danger { background: var(--danger); color: white; }

        input, select, textarea {
            width: 100%; background: #111; border: 1px solid #333; color: white;
            padding: 12px; margin-bottom: 10px; border-radius: 4px; outline: none;
        }
        input:focus { border-color: var(--primary); }

        /* --- HEADER & NAV --- */
        header {
            position: sticky; top: 0; background: rgba(5,5,5,0.95); padding: 15px; z-index: 100;
            border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center;
        }
        .header-center { text-align: center; flex-grow: 1; }
        #appTitle { cursor: pointer; user-select: none; } /* CLAVE PARA ADMIN */
        .auth-icon { font-size: 24px; cursor: pointer; position: relative; }
        .cart-icon-container { position: relative; cursor: pointer; }
        .cart-badge {
            position: absolute; top: -5px; right: -5px; background: var(--danger);
            color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%;
        }

        /* --- CATEGORIAS --- */
        .cat-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 10px 15px; scrollbar-width: none; }
        .cat-btn {
            background: #111; color: #888; border: 1px solid #333; padding: 8px 20px;
            border-radius: 20px; white-space: nowrap; transition: 0.3s;
        }
        .cat-btn.active { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); border-color: var(--primary); }

        /* --- PRODUCTOS --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: #111; border-radius: 10px; overflow: hidden; position: relative; border: 1px solid #222; }
        .card img { width: 100%; height: 160px; object-fit: cover; background: #000; }
        .card-body { padding: 10px; }
        .price { color: var(--success); font-family: 'Orbitron'; font-size: 1.1em; }
        .add-btn-mini { 
            position: absolute; bottom: 10px; right: 10px; background: var(--primary);
            color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: bold; cursor: pointer;
        }

        /* --- MODALES --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; padding: 20px;
            align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #161616; width: 100%; max-width: 400px; padding: 20px;
            border: 1px solid #333; position: relative; border-radius: 8px;
            max-height: 90vh; overflow-y: auto;
        }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; }

        /* --- LOGIN / REGISTER TABS (Punto 1) --- */
        .auth-tabs { display: flex; border-bottom: 2px solid #333; margin-bottom: 20px; }
        .auth-tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #666; font-family: 'Orbitron'; }
        .auth-tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group span { position: absolute; left: 12px; top: 12px; }
        .input-group input { padding-left: 35px; }

        /* --- PRODUCT DETAIL (Punto 4) --- */
        .detail-img-container { position: relative; margin-bottom: 10px; }
        .detail-main-img { width: 100%; height: 300px; object-fit: contain; background: #000; cursor: zoom-in; }
        .thumbs-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
        .thumb { width: 60px; height: 60px; object-fit: cover; border: 2px solid transparent; cursor: pointer; border-radius: 4px; }
        .thumb.selected { border-color: var(--primary); }
        
        .zoom-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 3000; align-items: center; justify-content: center;
        }
        .zoom-img { max-width: 100%; max-height: 100%; }
        .zoom-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; cursor: pointer; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 50%; }

        /* --- CART ITEMS & EFFECTS (Punto 6) --- */
        .cart-item { display: flex; align-items: center; justify-content: space-between; background: #111; padding: 10px; margin-bottom: 10px; border-radius: 5px; transition: background 0.3s; }
        .cart-item.flash-green { animation: flashGreen 0.5s ease-out; }
        @keyframes flashGreen {
            0% { background-color: #111; }
            50% { background-color: rgba(0, 255, 106, 0.3); box-shadow: 0 0 15px var(--success); }
            100% { background-color: #111; }
        }
        .qty-controls { display: flex; align-items: center; gap: 10px; background: #222; padding: 2px 8px; border-radius: 4px; }
        .qty-btn { font-size: 18px; cursor: pointer; color: var(--primary); font-weight: bold; }

        /* --- ADMIN PANEL --- */
        .preview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .preview-thumb { width: 100%; height: 50px; object-fit: cover; border-radius: 3px; border: 1px solid #444; }

        /* --- CHAT --- */
        .chat-fab {
            position: fixed; bottom: 20px; right: 20px; background: var(--success);
            width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 0 20px rgba(0,255,106,0.4); z-index: 1000;
        }
        .chat-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; margin-right: 10px; }

    </style>
</head>
<body>

    <audio id="cachinAudio" src="https://www.myinstants.com/media/sounds/ka-ching.mp3"></audio>

    <header>
        <div class="auth-icon" onclick="openAuth()">
            <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=random" style="width:30px; border-radius:50%;">
        </div>
        <div class="header-center">
            <h2 id="appTitle" onclick="tryOpenAdmin()">VIRTUD STORE</h2>
            <small style="color: #666; font-size: 10px;">V 1.2</small>
        </div>
        <div class="cart-icon-container" onclick="openCart()">
            🛒
            <span id="cartCount" class="cart-badge">0</span>
        </div>
    </header>

    <div class="cat-scroll" id="catContainer">
        </div>

    <div class="grid" id="productGrid">
        </div>

    <div class="chat-fab" onclick="window.open(db.config.whatsappUrl || '#', '_blank')">💬</div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('authModal')">&times;</span>
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchAuth('login', this)">INGRESAR</div>
                <div class="auth-tab" onclick="switchAuth('register', this)">REGISTRARSE</div>
            </div>

            <div id="loginForm">
                <div class="input-group"><span>📧</span><input type="email" placeholder="Correo"></div>
                <div class="input-group"><span>🔒</span><input type="password" placeholder="Contraseña"></div>
                <button class="btn" onclick="handleLogin()">INICIAR SESIÓN</button>
            </div>

            <div id="registerForm" style="display:none;">
                <div class="input-group"><span>👤</span><input type="text" id="regName" placeholder="Nombre Completo"></div>
                <div class="input-group"><span>📧</span><input type="email" placeholder="Correo"></div>
                <div class="input-group"><span>🔒</span><input type="password" placeholder="Crear Contraseña"></div>
                <button class="btn btn-outline" onclick="handleRegister()">CREAR CUENTA</button>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <span class="close-modal" onclick="closeModal('detailModal')">&times;</span>
            
            <h2 id="detailName" class="brand-font" style="margin-bottom: 10px;">Nombre Producto</h2>
            
            <div class="detail-img-container">
                <img id="detailMainImg" class="detail-main-img" onclick="openZoom()">
                <div id="detailThumbRow" class="thumbs-row"></div>
            </div>

            <h3 id="detailPrice" class="price" style="margin: 10px 0;">$0.00</h3>
            <p id="detailDesc" style="color: #ccc; margin-bottom: 20px; line-height: 1.4;">Descripción...</p>

            <button id="detailAddBtn" class="btn" onclick="addToCartFromDetail()">¡AGREGAR AL CARRITO!</button>
            
            <div style="margin-top: 15px; text-align: center;">
                <button class="btn btn-outline" style="font-size: 0.8em; padding: 8px;" onclick="shareProduct()">
                    📤 COMPARTIR CON AMIGOS
                </button>
            </div>
        </div>
    </div>

    <div id="zoomOverlay" class="zoom-overlay">
        <span class="zoom-close" onclick="closeZoom()">&times;</span>
        <img id="zoomImg" class="zoom-img">
    </div>

    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('cartModal')">&times;</span>
            <h2 class="brand-font">TU PEDIDO</h2>
            <div id="cartItems" style="margin-top: 20px; max-height: 300px; overflow-y: auto;"></div>
            <div style="border-top: 1px solid #333; margin-top: 20px; padding-top: 10px; display: flex; justify-content: space-between;">
                <h3>TOTAL:</h3>
                <h3 id="cartTotal" class="price">$0.00</h3>
            </div>
            <button class="btn" onclick="sendOrder()">HACER PEDIDO (WhatsApp)</button>
        </div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 class="brand-font" style="color:var(--primary)">PANEL DE CONTROL</h2>
                <span class="close-modal" onclick="closeModal('adminModal')">&times;</span>
            </div>
            
            <div style="margin-top: 20px; display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="btn" style="flex:1; font-size:12px;" onclick="showAdminTab('products')">PRODUCTOS</button>
                <button class="btn btn-outline" style="flex:1; font-size:12px;" onclick="showAdminTab('config')">CONFIG</button>
            </div>

            <div id="tabProducts">
                <h3>Nuevo Producto</h3>
                <select id="newProdCat">
                    <option value="Tecnología">Tecnología</option>
                    <option value="Aseo">Aseo</option>
                    <option value="Combos">Combos</option>
                </select>
                
                <label class="btn btn-outline" style="text-align:center; display:block; margin-bottom:5px;">
                    📸 SELECCIONAR FOTOS (Max 20)
                    <input type="file" id="imgInput" multiple accept="image/*" style="display:none" onchange="previewImages()">
                </label>
                <div id="previewGrid" class="preview-grid"></div>

                <input type="text" id="newProdName" placeholder="Nombre del Producto">
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="newProdPrice" placeholder="Precio">
                    <input type="text" value="USD" disabled style="width: 60px; text-align: center;">
                </div>
                <textarea id="newProdDesc" rows="3" placeholder="Descripción..."></textarea>
                
                <button class="btn" onclick="saveProduct()">GUARDAR PRODUCTO</button>

                <hr style="border-color:#333; margin: 20px 0;">
                <h3>Gestión Inventario</h3>
                <div id="adminProductList"></div>
            </div>

            <div id="tabConfig" style="display:none;">
                <h3>Apariencia</h3>
                <label>Color Global:</label>
                <input type="color" id="colorPicker" value="#00f3ff" style="height:50px; cursor:pointer;" onchange="updateColor(this.value)">
                
                <h3 style="margin-top:20px;">Chat Admin</h3>
                <input type="text" id="whatsappNumber" placeholder="Número WhatsApp (+53...)">
                
                <label>Foto de Perfil Admin:</label>
                <div style="display:flex; align-items:center; gap:10px;">
                    <img id="adminPreviewImg" src="" style="width:40px; height:40px; border-radius:50%; background:#333;">
                    <input type="file" id="adminPhotoInput" accept="image/*" onchange="uploadAdminPhoto()">
                </div>

                <button class="btn" style="margin-top:20px;" onclick="saveConfig()">GUARDAR CONFIG</button>
                <button class="btn btn-danger" style="margin-top:10px;" onclick="resetApp()">REINICIAR TODO (PELIGRO)</button>
            </div>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS LOCAL ---
        let db = {
            products: [],
            cart: [],
            config: {
                primaryColor: '#00f3ff',
                whatsappUrl: '',
                adminPhoto: null // Base64
            },
            user: null
        };

        let tempImages = []; // Para guardar las imagenes antes de subir
        let currentDetailProduct = null;

        // --- INICIALIZACIÓN ---
        function init() {
            const saved = localStorage.getItem('virtud_v1_2');
            if (saved) {
                db = JSON.parse(saved);
            } else {
                // Datos Demo
                db.products = [
                    { id: 1, name: "Smart TV Samsung 65\"", price: 720, cat: "Tecnología", images: ["https://images.samsung.com/is/image/samsung/p6pim/co/un65au7000kxlx/gallery/co-uhd-au7000-un65au7000kxlx-530472491?$684_547_PNG$"], desc: "UHD 4K Smart Tizen TV (2025)" },
                    { id: 2, name: "Refrigerador EKO 8.1", price: 400, cat: "Tecnología", images: ["https://media.istockphoto.com/id/1196974664/photo/modern-refrigerator-isolated-on-white-background.jpg?s=612x612&w=0&k=20&c=6P4sF2yM1qO_4pQ_aR8GqX6qZ5qX_z_1qQ_aR8GqX6q"], desc: "Doble temperatura, bajo consumo." }
                ];
            }
            applyConfig();
            renderCategories();
            renderProducts('Todos');
            updateCartCount();
        }

        function saveDB() {
            localStorage.setItem('virtud_v1_2', JSON.stringify(db));
        }

        function applyConfig() {
            document.documentElement.style.setProperty('--primary', db.config.primaryColor);
            document.getElementById('colorPicker').value = db.config.primaryColor;
            document.getElementById('whatsappNumber').value = db.config.whatsappUrl ? db.config.whatsappUrl.split('phone=')[1] : '';
            if (db.user) {
                document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${db.user.name}&background=00f3ff&color=000`;
            }
            if (db.config.adminPhoto) {
                // Aquí podrías actualizar una imagen en un chat simulado si existiera
                document.getElementById('adminPreviewImg').src = db.config.adminPhoto;
            }
        }

        // --- AUTH (PUNTO 1) ---
        function openAuth() { document.getElementById('authModal').classList.add('active'); }
        
        function switchAuth(type, tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            if(type === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
        }

        function handleRegister() {
            const name = document.getElementById('regName').value;
            if(!name) return alert("Falta el nombre");
            db.user = { name: name, joined: new Date() };
            saveDB();
            applyConfig();
            closeModal('authModal');
            alert(`¡Bienvenido a la Elite, ${name}!`);
        }

        function handleLogin() {
            // Simulacion
            closeModal('authModal');
            alert("Sesión Iniciada (Demo)");
        }

        // --- ADMIN (PUNTO 2 y 3 y 5) ---
        function tryOpenAdmin() {
            const pass = prompt("Acceso Administrativo Requerido:");
            if (pass === "separabit2020") {
                document.getElementById('adminModal').classList.add('active');
                renderAdminList();
            } else if (pass !== null) {
                alert("Acceso Denegado");
            }
        }

        function uploadAdminPhoto() {
            const file = document.getElementById('adminPhotoInput').files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    db.config.adminPhoto = e.target.result; // Guardar Base64
                    document.getElementById('adminPreviewImg').src = e.target.result;
                    saveDB();
                };
                reader.readAsDataURL(file);
            }
        }

        // PREVIEW IMAGENES MULTIPLES (PUNTO 5)
        function previewImages() {
            const files = document.getElementById('imgInput').files;
            const grid = document.getElementById('previewGrid');
            grid.innerHTML = '';
            tempImages = [];

            if (files.length > 20) {
                alert("Máximo 20 fotos permitidas.");
                return;
            }

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    tempImages.push(e.target.result);
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-thumb';
                    grid.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        function saveProduct() {
            const name = document.getElementById('newProdName').value;
            const price = parseFloat(document.getElementById('newProdPrice').value);
            const cat = document.getElementById('newProdCat').value;
            const desc = document.getElementById('newProdDesc').value;

            if (!name || !price || tempImages.length === 0) {
                return alert("Faltan datos o fotos");
            }

            db.products.push({
                id: Date.now(),
                name, price, cat, desc,
                images: [...tempImages] // Copia del array
            });

            saveDB();
            renderProducts('Todos');
            renderAdminList();
            
            // RESET FORM (PUNTO 5 - No cierra modal, solo limpia)
            document.getElementById('newProdName').value = '';
            document.getElementById('newProdPrice').value = '';
            document.getElementById('newProdDesc').value = '';
            document.getElementById('imgInput').value = '';
            document.getElementById('previewGrid').innerHTML = '';
            tempImages = [];
            alert("Producto Guardado. Listo para el siguiente.");
        }

        function showAdminTab(tabName) {
            document.getElementById('tabProducts').style.display = tabName === 'products' ? 'block' : 'none';
            document.getElementById('tabConfig').style.display = tabName === 'config' ? 'block' : 'none';
        }

        function updateColor(color) {
            db.config.primaryColor = color;
            applyConfig();
            saveDB();
        }

        function renderAdminList() {
            const list = document.getElementById('adminProductList');
            list.innerHTML = db.products.map(p => `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333;">
                    <span>${p.name}</span>
                    <button class="btn-danger" style="width:auto; padding:5px 10px;" onclick="deleteProduct(${p.id})">X</button>
                </div>
            `).join('');
        }
        
        function deleteProduct(id) {
            if(confirm('¿Eliminar?')) {
                db.products = db.products.filter(p => p.id !== id);
                saveDB();
                renderProducts('Todos');
                renderAdminList();
            }
        }

        // --- RENDERIZADO ---
        function renderCategories() {
            const cats = ['Todos', 'Combos', 'Aseo', 'Tecnología', 'Ropa'];
            const container = document.getElementById('catContainer');
            container.innerHTML = cats.map(c => 
                `<button class="cat-btn ${c==='Todos'?'active':''}" onclick="filterCat('${c}', this)">${c}</button>`
            ).join('');
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(cat);
        }

        function renderProducts(cat) {
            const grid = document.getElementById('productGrid');
            const filtered = cat === 'Todos' ? db.products : db.products.filter(p => p.cat === cat);
            
            if (filtered.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #666; margin-top: 50px;">Vacío</p>';
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="card" onclick="openProductDetail(${p.id})">
                    <img src="${p.images[0]}" loading="lazy">
                    <div class="card-body">
                        <h4 style="font-size: 0.9rem; margin-bottom: 5px;">${p.name}</h4>
                        <div class="price">$${p.price}</div>
                    </div>
                </div>
            `).join('');
        }

        // --- DETALLE DE PRODUCTO (PUNTO 4) ---
        function openProductDetail(id) {
            currentDetailProduct = db.products.find(p => p.id === id);
            if(!currentDetailProduct) return;

            document.getElementById('detailName').innerText = currentDetailProduct.name;
            document.getElementById('detailName').style.color = db.config.primaryColor; // Sync Color
            document.getElementById('detailPrice').innerText = `$${currentDetailProduct.price}`;
            document.getElementById('detailDesc').innerText = currentDetailProduct.desc || "Sin descripción";
            
            // Imagenes
            const mainImg = document.getElementById('detailMainImg');
            mainImg.src = currentDetailProduct.images[0];
            
            const thumbRow = document.getElementById('detailThumbRow');
            thumbRow.innerHTML = currentDetailProduct.images.map((img, index) => `
                <img src="${img}" class="thumb ${index===0?'selected':''}" onclick="setMainImg('${img}', this)">
            `).join('');

            // Boton
            const btn = document.getElementById('detailAddBtn');
            btn.style.background = db.config.primaryColor; // Sync Color

            document.getElementById('detailModal').classList.add('active');
        }

        function setMainImg(src, thumb) {
            document.getElementById('detailMainImg').src = src;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('selected'));
            thumb.classList.add('selected');
        }

        function openZoom() {
            const src = document.getElementById('detailMainImg').src;
            document.getElementById('zoomImg').src = src;
            document.getElementById('zoomOverlay').style.display = 'flex';
        }
        function closeZoom() {
            document.getElementById('zoomOverlay').style.display = 'none';
        }

        function shareProduct() {
            if (navigator.share) {
                navigator.share({
                    title: currentDetailProduct.name,
                    text: `Mira este ${currentDetailProduct.name} en VIRTUD STORE!`,
                    url: window.location.href
                });
            } else {
                alert("Link copiado al portapapeles (Simulado)");
            }
        }

        function addToCartFromDetail() {
            if(currentDetailProduct) {
                addToCart(currentDetailProduct);
                closeModal('detailModal');
            }
        }

        // --- CARRITO & EFECTOS (PUNTO 6) ---
        function addToCart(product) {
            const existing = db.cart.find(item => item.id === product.id);
            if (existing) {
                existing.qty++;
                playCashSound(); // Efecto Sonido
                // Efecto Visual (se maneja en renderCart si estuviera abierto, pero aqui solo notificamos)
                showFlashMsg("¡Producto sumado!"); 
            } else {
                db.cart.push({ ...product, qty: 1 });
                playCashSound();
            }
            saveDB();
            updateCartCount();
        }

        function playCashSound() {
            const audio = document.getElementById('cachinAudio');
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Audio bloqueado por navegador"));
        }

        function showFlashMsg(msg) {
            // Un pequeño toast rapido
            const div = document.createElement('div');
            div.innerText = msg;
            div.style.cssText = `position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--success); color:#000; padding:10px 20px; border-radius:20px; z-index:5000; font-weight:bold;`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2000);
        }

        function openCart() {
            renderCartItems();
            document.getElementById('cartModal').classList.add('active');
        }

        function renderCartItems() {
            const container = document.getElementById('cartItems');
            let total = 0;
            container.innerHTML = db.cart.map((item, index) => {
                total += item.price * item.qty;
                return `
                <div class="cart-item" id="cart-item-${item.id}">
                    <div>
                        <div style="font-weight:bold; color:white;">${item.name}</div>
                        <div style="font-size:0.9em; color:#888;">$${item.price} x ${item.qty}</div>
                    </div>
                    <div class="qty-controls">
                        <div class="qty-btn" onclick="changeQty(${index}, -1)">-</div>
                        <span style="color:white;">${item.qty}</span>
                        <div class="qty-btn" onclick="changeQty(${index}, 1)">+</div>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('cartTotal').innerText = `$${total.toFixed(2)}`;
        }

        function changeQty(index, delta) {
            const item = db.cart[index];
            if (delta > 0) {
                playCashSound();
                // Efecto Flash Verde (Punto 6)
                setTimeout(() => {
                    const row = document.getElementById(`cart-item-${item.id}`);
                    if(row) {
                        row.classList.remove('flash-green');
                        void row.offsetWidth; // Trigger reflow
                        row.classList.add('flash-green');
                    }
                }, 50);
            }

            item.qty += delta;
            if (item.qty <= 0) db.cart.splice(index, 1);
            saveDB();
            renderCartItems();
            updateCartCount();
        }

        function updateCartCount() {
            const count = db.cart.reduce((acc, item) => acc + item.qty, 0);
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartCount').style.display = count > 0 ? 'block' : 'none';
        }

        function sendOrder() {
            if (db.cart.length === 0) return;
            let msg = "Hola VIRTUD STORE, quiero pedir:\n\n";
            let total = 0;
            db.cart.forEach(item => {
                msg += `▪ ${item.name} (x${item.qty}) - $${item.price * item.qty}\n`;
                total += item.price * item.qty;
            });
            msg += `\nTOTAL: $${total}`;
            
            const phone = db.config.whatsappNumber || "5300000000"; 
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        // Arrancar
        init();

    </script>
</body>
</html>
